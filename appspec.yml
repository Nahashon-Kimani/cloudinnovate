version: 0.0
os: linux

files:
  - source: /
    destination: /var/www/html
    file_exists_behavior: OVERWRITE
permissions:
  - object: /var/www/html
    owner: apache
    group: apache
    mode: 755

hooks:
  BeforeInstall:
    - location: codedeploy/install_apache2.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: codedeploy/after_install.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: codedeploy/start_apache2.sh
      timeout: 300
      runas: root


